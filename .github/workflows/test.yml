name: CI Testing & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    # 1. Check out the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up the specific Python environment matrix
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Automatically caches dependencies to speed up future runs

    # 3. Install core and testing dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    # 4. Enforce strict code formatting styles
    - name: Check Code Formatting (Black)
      run: |
        black --check .

    # 5. Lint code for syntax errors and undefined variables
    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub Editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 6. Check for type safety
    - name: Type Check with Mypy
      run: |
        mypy --ignore-missing-imports .

    # 7. Scan codebase for security vulnerabilities (e.g., hardcoded tokens)
    - name: Security Scan (Bandit)
      run: |
        bandit -r . -x ./tests

    # 8. Run unit test suite with coverage reporting
    - name: Run Tests with Pytest
      env:
        # Mock environments can be declared here if needed
        HA_TEST_URL: "http://localhost:8123"
      run: |
        pytest --cov=./ --cov-report=xml --cov-fail-under=90

    # 9. Optional: Upload coverage reports to GitHub Actions artifacts
    - name: Upload Coverage to Actions
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml

